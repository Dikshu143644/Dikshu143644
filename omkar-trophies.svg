<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1092" height="168" viewBox="0 0 1092 168" role="img" aria-labelledby="trophies-title trophies-desc">
  <title id="trophies-title">Omkar Supe custom profile highlights</title>
  <desc id="trophies-desc">Six original DOS custom highlights, not official GitHub awards or ranks: Student Builder, Original Solutions, UI Explorer, Project Creator, Open Source Learner, and Growth Mindset.</desc>

  <defs>
    <linearGradient id="trophies-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffafd"/><stop offset=".52" stop-color="#fff3fa"/><stop offset="1" stop-color="#f5efff"/>
    </linearGradient>
    <linearGradient id="trophies-pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7eb6"/><stop offset=".5" stop-color="#e879f9"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tile-a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#fff0f8"/></linearGradient>
    <linearGradient id="tile-b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#f7efff"/></linearGradient>
    <linearGradient id="trophies-gloss" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".8"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
    <filter id="trophies-shadow" x="-25%" y="-45%" width="150%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#873376" flood-opacity=".13"/>
    </filter>
    <clipPath id="trophies-shell"><rect x="1" y="1" width="1090" height="166" rx="18"/></clipPath>
  </defs>

  <style>
    .sans { font-family:"Segoe UI", Inter, Arial, sans-serif; }
    .mono { font-family:Consolas, "SFMono-Regular", monospace; }
    .tile { transform-box:fill-box; transform-origin:center; animation:trophies-pop .56s cubic-bezier(.2,.85,.3,1) both; }
    .c2 { animation-delay:.06s; } .c3 { animation-delay:.12s; } .c4 { animation-delay:.18s; } .c5 { animation-delay:.24s; } .c6 { animation-delay:.3s; }
    .title { font-size:9px; font-weight:900; letter-spacing:.35px; fill:#55214d; }
    .note { font-size:7px; fill:#97618b; }
    .heart { animation:trophies-heart 3.2s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
    .h2 { animation-delay:1.1s; }
    .shine { animation:trophies-shine 6s ease-in-out infinite; }
    @keyframes trophies-pop { from { transform:translateY(3px) scale(.985); } to { transform:translateY(0) scale(1); } }
    @keyframes trophies-heart { 0%,100% { opacity:.45; transform:scale(.82) rotate(0); } 50% { opacity:1; transform:scale(1.12) rotate(7deg); } }
    @keyframes trophies-shine { 0%,72%,100% { transform:translateX(-95px); opacity:0; } 82% { opacity:.6; } 95% { transform:translateX(1160px); opacity:0; } }
    @media (prefers-reduced-motion:reduce) { .tile,.heart,.shine { animation:none !important; } }
  </style>

  <g clip-path="url(#trophies-shell)">
    <rect x="1" y="1" width="1090" height="166" rx="18" fill="url(#trophies-bg)"/>
    <circle cx="28" cy="20" r="110" fill="#ff7eb6" opacity=".08"/>
    <circle cx="1080" cy="155" r="130" fill="#c084fc" opacity=".07"/>
    <path d="M0 38C190 5 270 53 453 25S816 4 1092 35V0H0Z" fill="#fff" opacity=".42"/>
  </g>
  <rect x="1" y="1" width="1090" height="166" rx="18" fill="none" stroke="#f4a3cf" stroke-width="1.5"/>

  <g transform="translate(14 10)">
    <circle cx="12" cy="12" r="11" fill="#fff" stroke="#f3afd4"/>
    <text class="sans" x="12" y="15" text-anchor="middle" font-size="6.7" font-weight="900" fill="#8b3f80">DOS</text>
  </g>
  <text class="sans" x="44" y="17" font-size="6.8" font-weight="800" letter-spacing="1.3" fill="#b44d90">DESIGNING ORIGINAL SOLUTIONS</text>
  <text class="sans" x="44" y="32" font-size="13.2" font-weight="900" fill="#4e204a">Custom builder highlights</text>
  <g transform="translate(874 10)">
    <rect width="202" height="24" rx="12" fill="#fff" stroke="#edb5d8"/>
    <circle cx="13" cy="12" r="3" fill="#ff7eb6"/>
    <text class="mono" x="23" y="15" font-size="6.7" font-weight="700" letter-spacing=".35" fill="#7d4770">ORIGINAL &#8226; CUSTOM &#8226; NO RANKS</text>
  </g>
  <path d="M14 43H1078" stroke="#efc5df"/>
  <path d="M14 43H165" stroke="url(#trophies-pink)" stroke-width="2" stroke-linecap="round"/>

  <g class="tile c1" filter="url(#trophies-shadow)">
    <rect x="16" y="52" width="170" height="98" rx="13" fill="url(#tile-a)" stroke="#f2bdd9"/>
    <circle cx="101" cy="78" r="18" fill="#ffe4f1" stroke="#ff9ac5"/>
    <path d="m87 74 14-7 14 7-14 7Zm5 4v7c6 4 12 4 18 0v-7m4-2v10" fill="none" stroke="#d84d90" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="sans title" x="101" y="112" text-anchor="middle">STUDENT BUILDER</text>
    <text class="sans note" x="101" y="126" text-anchor="middle">Computer Engineering</text>
    <path d="M65 136H137" stroke="#f2bdd9"/>
  </g>

  <g class="tile c2" filter="url(#trophies-shadow)">
    <rect x="194" y="52" width="170" height="98" rx="13" fill="url(#tile-b)" stroke="#edc0ef"/>
    <circle cx="279" cy="78" r="18" fill="#fbe7ff" stroke="#e879f9"/>
    <path d="M279 65c-8 0-13 5-13 12 0 5 3 8 7 11v4h12v-4c4-3 7-6 7-11 0-7-5-12-13-12Zm-5 31h10" fill="none" stroke="#b44bc4" stroke-width="1.6" stroke-linecap="round"/>
    <path d="m279 70 2 4 4.5.6-3.2 3.1.8 4.5-4.1-2.1-4.1 2.1.8-4.5-3.2-3.1 4.5-.6Z" fill="none" stroke="#b44bc4" stroke-width="1.1"/>
    <text class="sans title" x="279" y="112" text-anchor="middle">ORIGINAL SOLUTIONS</text>
    <text class="sans note" x="279" y="126" text-anchor="middle">DOS philosophy</text>
    <path d="M243 136H315" stroke="#edc0ef"/>
  </g>

  <g class="tile c3" filter="url(#trophies-shadow)">
    <rect x="372" y="52" width="170" height="98" rx="13" fill="url(#tile-a)" stroke="#e6c5f3"/>
    <circle cx="457" cy="78" r="18" fill="#f5eaff" stroke="#c084fc"/>
    <rect x="445" y="68" width="24" height="18" rx="2.5" fill="none" stroke="#8f54d5" stroke-width="1.5"/>
    <path d="M445 73h24m-20-2h.1m3 0h.1m3 5v8l3-2.5 3 5 2.6-1.4-3-5 4-.5Z" fill="none" stroke="#8f54d5" stroke-width="1.25" stroke-linejoin="round"/>
    <text class="sans title" x="457" y="112" text-anchor="middle">UI EXPLORER</text>
    <text class="sans note" x="457" y="126" text-anchor="middle">Frontend &amp; UI/UX</text>
    <path d="M421 136H493" stroke="#e6c5f3"/>
  </g>

  <g class="tile c4" filter="url(#trophies-shadow)">
    <rect x="550" y="52" width="170" height="98" rx="13" fill="url(#tile-b)" stroke="#dfc7f5"/>
    <circle cx="635" cy="78" r="18" fill="#f1eaff" stroke="#a873f8"/>
    <path d="m622 73 13-7 13 7-13 7Zm0 0v13l13 7 13-7V73m-13 7v13m-7-17 13-7" fill="none" stroke="#7d4ed0" stroke-width="1.5" stroke-linejoin="round"/>
    <text class="sans title" x="635" y="112" text-anchor="middle">PROJECT CREATOR</text>
    <text class="sans note" x="635" y="126" text-anchor="middle">23 public repositories</text>
    <path d="M599 136H671" stroke="#dfc7f5"/>
  </g>

  <g class="tile c5" filter="url(#trophies-shadow)">
    <rect x="728" y="52" width="170" height="98" rx="13" fill="url(#tile-a)" stroke="#e6c2ed"/>
    <circle cx="813" cy="78" r="18" fill="#f8e7ff" stroke="#b568ed"/>
    <circle cx="805" cy="70" r="3.3" fill="none" stroke="#8744bc" stroke-width="1.4"/><circle cx="821" cy="78" r="3.3" fill="none" stroke="#8744bc" stroke-width="1.4"/><circle cx="805" cy="87" r="3.3" fill="none" stroke="#8744bc" stroke-width="1.4"/>
    <path d="M808.3 70h4c5 0 8.7 3.2 8.7 5m-12.7 12h4c5 0 8.7-3.2 8.7-5M805 73.3v10.4" fill="none" stroke="#8744bc" stroke-width="1.4" stroke-linecap="round"/>
    <text class="sans title" x="813" y="109" text-anchor="middle">OPEN SOURCE</text>
    <text class="sans title" x="813" y="120" text-anchor="middle">LEARNER</text>
    <text class="sans note" x="813" y="133" text-anchor="middle">learn &#8226; contribute</text>
  </g>

  <g class="tile c6" filter="url(#trophies-shadow)">
    <rect x="906" y="52" width="170" height="98" rx="13" fill="url(#tile-b)" stroke="#dcc5f3"/>
    <circle cx="991" cy="78" r="18" fill="#f1eaff" stroke="#8b5cf6"/>
    <path d="M978 89h27m-23-4 6-6 5 3 10-12m-5 0h5v5" fill="none" stroke="#7044c4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M991 90V80c0-7-4-11-9-14m9 14c0-7 4-11 9-14" fill="none" stroke="#7044c4" stroke-width="1.2" stroke-linecap="round" opacity=".72"/>
    <text class="sans title" x="991" y="112" text-anchor="middle">GROWTH MINDSET</text>
    <text class="sans note" x="991" y="126" text-anchor="middle">always improving</text>
    <path d="M955 136H1027" stroke="#dcc5f3"/>
  </g>

  <g clip-path="url(#trophies-shell)" opacity=".28"><rect class="shine" x="-80" y="48" width="62" height="106" transform="skewX(-16)" fill="url(#trophies-gloss)"/></g>
  <g class="heart"><path d="M1067 40c-4-5-12-1-9 5l9 8 9-8c3-6-5-10-9-5Z" fill="#ff7eb6"/></g>
  <g class="heart h2"><path d="M25 153c-2.4-3-7.2-.6-5.4 3l5.4 4.8 5.4-4.8c1.8-3.6-3-6-5.4-3Z" fill="#c084fc"/></g>
  <text class="mono" x="546" y="162" text-anchor="middle" font-size="6.2" letter-spacing=".45" fill="#946388">CUSTOM DOS PROFILE HIGHLIGHTS &#8226; NOT OFFICIAL GITHUB AWARDS</text>
</svg>
