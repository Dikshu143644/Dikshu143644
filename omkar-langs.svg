<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="282" viewBox="0 0 420 282" role="img" aria-labelledby="langs-title langs-desc">
  <title id="langs-title">Omkar Supe top public repository languages</title>
  <desc id="langs-desc">A soft pink DOS language card. The top four normalized shares are TypeScript 78.2 percent and 1,978,800 bytes, HTML 9.3 percent and 236,342 bytes, JavaScript 7.5 percent and 190,261 bytes, and CSS 5.0 percent and 125,360 bytes. The top four account for 98.9 percent of all reported bytes.</desc>

  <defs>
    <linearGradient id="langs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffafd"/><stop offset=".55" stop-color="#fff3fa"/><stop offset="1" stop-color="#f6efff"/>
    </linearGradient>
    <linearGradient id="langs-pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7eb6"/><stop offset=".5" stop-color="#e879f9"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="langs-gloss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".82"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="langs-shadow" x="-25%" y="-60%" width="150%" height="220%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#91348b" flood-opacity=".12"/>
    </filter>
    <clipPath id="langs-shell"><rect x="1" y="1" width="418" height="280" rx="18"/></clipPath>
    <clipPath id="langs-stack"><rect x="14" y="64" width="392" height="15" rx="7.5"/></clipPath>
  </defs>

  <style>
    .sans { font-family: "Segoe UI", Inter, Arial, sans-serif; }
    .mono { font-family: Consolas, "SFMono-Regular", monospace; }
    .name { font-size: 9px; font-weight: 800; fill: #56234f; }
    .bytes { font-size: 7.5px; fill: #9a638c; }
    .pct { font-size: 10px; font-weight: 900; fill: #56234f; }
    .row { transform-box: fill-box; transform-origin: left center; animation: langs-pop .55s cubic-bezier(.2,.85,.3,1) both; }
    .r2 { animation-delay:.07s; } .r3 { animation-delay:.14s; } .r4 { animation-delay:.21s; }
    .bar { transform-box: fill-box; transform-origin: left center; animation: langs-grow .85s cubic-bezier(.2,.8,.2,1) both; }
    .r2 .bar { animation-delay:.1s; } .r3 .bar { animation-delay:.18s; } .r4 .bar { animation-delay:.26s; }
    .spark { animation: langs-twinkle 3s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
    .s2 { animation-delay:1.2s; }
    .gloss { animation: langs-gloss 5s ease-in-out infinite; }
    @keyframes langs-pop { from { transform:translateX(-2px) scale(.99); } to { transform:translateX(0) scale(1); } }
    @keyframes langs-grow { from { transform:scaleX(.06); } to { transform:scaleX(1); } }
    @keyframes langs-twinkle { 0%,100% { opacity:.35; transform:scale(.8) rotate(0); } 50% { opacity:1; transform:scale(1.12) rotate(12deg); } }
    @keyframes langs-gloss { 0%,72%,100% { transform:translateX(-80px); opacity:0; } 82% { opacity:.6; } 94% { transform:translateX(430px); opacity:0; } }
    @media (prefers-reduced-motion: reduce) { .row,.bar,.spark,.gloss { animation:none !important; } }
  </style>

  <g clip-path="url(#langs-shell)">
    <rect x="1" y="1" width="418" height="280" rx="18" fill="url(#langs-bg)"/>
    <circle cx="-5" cy="22" r="84" fill="#ff7eb6" opacity=".09"/>
    <circle cx="417" cy="260" r="98" fill="#c084fc" opacity=".07"/>
    <path d="M0 42C82 13 144 58 224 31S340 12 420 38V0H0Z" fill="#fff" opacity=".42"/>
  </g>
  <rect x="1" y="1" width="418" height="280" rx="18" fill="none" stroke="#f4a3cf" stroke-width="1.5"/>

  <g transform="translate(14 12)">
    <circle cx="13" cy="13" r="12" fill="#fff" stroke="#f3afd4"/>
    <text class="sans" x="13" y="16" text-anchor="middle" font-size="7.2" font-weight="900" fill="#8b3f80">DOS</text>
  </g>
  <text class="sans" x="45" y="20" font-size="7" font-weight="800" letter-spacing="1.3" fill="#b44d90">CODE COMPOSITION</text>
  <text class="sans" x="45" y="37" font-size="14.5" font-weight="900" fill="#4e204a">Top public-repo languages</text>
  <g transform="translate(305 13)">
    <rect width="101" height="25" rx="12.5" fill="#fff" stroke="#edb5d8"/>
    <circle cx="13" cy="12.5" r="3" fill="#ff7eb6"/>
    <text class="mono" x="23" y="15.5" font-size="6.7" font-weight="700" fill="#7c4770">23 PUBLIC REPOS</text>
  </g>
  <path d="M14 49H406" stroke="#efc5df"/>
  <path d="M14 49H112" stroke="url(#langs-pink)" stroke-width="2" stroke-linecap="round"/>

  <g clip-path="url(#langs-stack)" filter="url(#langs-shadow)">
    <rect x="14" y="64" width="306.5" height="15" fill="#ff7eb6"/>
    <rect x="320.5" y="64" width="36.5" height="15" fill="#e879f9"/>
    <rect x="357" y="64" width="29.4" height="15" fill="#c084fc"/>
    <rect x="386.4" y="64" width="19.6" height="15" fill="#8b5cf6"/>
    <rect class="gloss" x="-60" y="64" width="44" height="15" transform="skewX(-18)" fill="url(#langs-gloss)"/>
  </g>
  <text class="mono" x="14" y="91" font-size="6.4" letter-spacing=".45" fill="#9c668e">TOP FOUR &#8226; NORMALIZED TO 100%</text>
  <g class="spark"><path d="M394 45l1.7 3.2 3.2 1.7-3.2 1.7-1.7 3.2-1.7-3.2-3.2-1.7 3.2-1.7Z" fill="#ff7eb6"/></g>

  <g class="row r1">
    <circle cx="18" cy="111" r="4" fill="#ff7eb6"/>
    <text class="sans name" x="29" y="114">TypeScript</text>
    <text class="mono bytes" x="122" y="114">1,978,800 bytes</text>
    <text class="sans pct" x="403" y="114" text-anchor="end">78.2%</text>
    <rect x="14" y="121" width="392" height="8" rx="4" fill="#f3ddeb"/>
    <rect class="bar" x="14" y="121" width="306.5" height="8" rx="4" fill="#ff7eb6"/>
  </g>
  <g class="row r2">
    <circle cx="18" cy="149" r="4" fill="#e879f9"/>
    <text class="sans name" x="29" y="152">HTML</text>
    <text class="mono bytes" x="122" y="152">236,342 bytes</text>
    <text class="sans pct" x="403" y="152" text-anchor="end">9.3%</text>
    <rect x="14" y="159" width="392" height="8" rx="4" fill="#f3ddeb"/>
    <rect class="bar" x="14" y="159" width="36.5" height="8" rx="4" fill="#e879f9"/>
  </g>
  <g class="row r3">
    <circle cx="18" cy="187" r="4" fill="#c084fc"/>
    <text class="sans name" x="29" y="190">JavaScript</text>
    <text class="mono bytes" x="122" y="190">190,261 bytes</text>
    <text class="sans pct" x="403" y="190" text-anchor="end">7.5%</text>
    <rect x="14" y="197" width="392" height="8" rx="4" fill="#f3ddeb"/>
    <rect class="bar" x="14" y="197" width="29.4" height="8" rx="4" fill="#c084fc"/>
  </g>
  <g class="row r4">
    <circle cx="18" cy="225" r="4" fill="#8b5cf6"/>
    <text class="sans name" x="29" y="228">CSS</text>
    <text class="mono bytes" x="122" y="228">125,360 bytes</text>
    <text class="sans pct" x="403" y="228" text-anchor="end">5.0%</text>
    <rect x="14" y="235" width="392" height="8" rx="4" fill="#f3ddeb"/>
    <rect class="bar" x="14" y="235" width="19.6" height="8" rx="4" fill="#8b5cf6"/>
  </g>

  <g class="spark s2"><path d="M389 252l1.5 2.8 2.8 1.5-2.8 1.5-1.5 2.8-1.5-2.8-2.8-1.5 2.8-1.5Z" fill="#c084fc"/></g>
  <rect x="14" y="255" width="392" height="17" rx="8.5" fill="#fff" stroke="#efc5df"/>
  <text class="mono" x="210" y="266.3" text-anchor="middle" font-size="6.1" letter-spacing=".22" fill="#8f5c83">TOP FOUR = 98.9% OF ALL REPORTED BYTES &#8226; SHARES NORMALIZED</text>
</svg>
